trigger:
- main

pool:
  name: My_Agent_Pool

steps:
- task: Gradle@4
  displayName: 'Ejecutar pruebas con Gradle'
  inputs:
    gradleWrapperFile: 'gradlew'
    workingDirectory: '$(System.DefaultWorkingDirectory)'
    options: '--stacktrace -Dfile.encoding=UTF-8'
    tasks: 'clean test aggregate'
    publishJUnitResults: true
    testResultsFiles: '**/TEST-*.xml'
    testRunTitle: 'Pruebas Serenity BDD'
    javaHomeOption: 'Path'
    jdkUserInputPath: 'C:\Program Files\Java\jdk-17'
    sonarQubeRunAnalysis: false
    spotBugsAnalysis: false
  env:
    JAVA_TOOL_OPTIONS: '-Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8'
  continueOnError: true

- task: PublishBuildArtifacts@1
  displayName: 'Publicar reporte Serenity'
  inputs:
    PathtoPublish: 'target/site/serenity'
    ArtifactName: 'SerenityReport'
    publishLocation: 'Container'
  condition: always()