serenity {
  encoding = "UTF-8"
  take.screenshots = FOR_EACH_ACTION
  reports.directory = "target/site/serenity"
  reports = single-page-html
  restart.browser.for.each = scenario
}

# web driver chrome
webdriver {
    driver = "chrome"
    autodownload = true
    capabilities {
        browserName = "chrome"
        "goog:chromeOptions" {
            args = [
                "--headless=new",
                "--no-sandbox",
                "--disable-dev-shm-usage",
                "--disable-gpu",
                "--window-size=1920,1080",
                "--lang=es",
                "--ignore-certificate-errors",
                "--disable-popup-blocking",
                "--allow-outdated-plugins",
                "--enable-plugins",
                "--disable-translate",
                "--remote-allow-origins=*",
                "--test-type"
            ]
        }
    }
}