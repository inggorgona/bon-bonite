serenity {
  encoding = "UTF-8"
  take.screenshots = FOR_EACH_ACTION
  serenity.reports.directory = "target/site/serenity"
  serenity.reports = single-page-html
  serenity.restart.browser.for.each = scenario

}

#web driver chrome
webdriver {
    driver = "chrome"
    autodownload = true
    capabilities {
        browserName = "chrome"
        "goog:chromeOptions" {
            args = ["--start-maximized", "--lang=es", "--ignore-certificate-errors",
                   "--disable-popup-blocking", "--allow-outdated-plugins", "--enable-plugins", "--disable-translate",
                   "--remote-allow-origins=*", "--test-type", "--incognito"]
        }
    }
}